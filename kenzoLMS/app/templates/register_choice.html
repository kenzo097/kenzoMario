{% extends "base.html" %}
{% block title %}Выбор типа аккаунта{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Выберите тип аккаунта</h1>
                <p class="text-muted">Зарегистрируйтесь отдельно как ученик или как учитель.</p>
                <div class="d-grid gap-2">
                    <a class="btn btn-success" href="{{ url_for('auth.register_student') }}">Я ученик</a>
                    <a class="btn btn-info" href="{{ url_for('auth.register_teacher') }}">Я учитель</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
